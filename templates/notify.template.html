<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PR merged 🎉 — {{NUMBER}}</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 40%, #f093fb 100%);
      background-size: 200% 200%;
      animation: gradientShift 8s ease-in-out infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .stage {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .badge {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 1rem;
      text-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
      animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both, floatY 3s ease-in-out infinite 0.6s;
    }
    .emoji {
      display: inline-block;
      animation: spin 2s ease-in-out infinite alternate;
    }

    .repo {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      font-weight: 600;
      opacity: 0.95;
      margin: 0 0 0.5rem;
      animation: fadeUp 0.8s ease-out 0.4s both;
    }
    .title {
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      font-weight: 400;
      opacity: 0.9;
      max-width: 900px;
      margin: 0 0 2.5rem;
      line-height: 1.4;
      animation: fadeUp 0.8s ease-out 0.6s both;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      color: white;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      transition: transform 0.2s ease, background 0.2s ease;
      animation: fadeUp 0.8s ease-out 0.8s both, glow 2.5s ease-in-out infinite 1.4s;
    }
    .cta:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.25);
    }

    .hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      opacity: 0.65;
      animation: fadeIn 1s ease-out 1.6s both;
    }

    canvas.confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes pop {
      0%   { transform: scale(0.4); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    @keyframes spin {
      from { transform: rotate(-8deg); }
      to   { transform: rotate(8deg); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 0.65; }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
      50%      { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
    }
  </style>
</head>
<body>
  <canvas class="confetti" id="confetti"></canvas>

  <div class="stage">
    <h1 class="badge"><span class="emoji">🎉</span> PR MERGED <span class="emoji">🎉</span></h1>
    <p class="repo">{{REPO}} <strong>#{{NUMBER}}</strong></p>
    <p class="title">{{TITLE}}</p>
    <a class="cta" href="{{URL}}" target="_blank" rel="noopener">
      Open on GitHub ↗
    </a>
    <p class="hint">Merged {{MERGED_AT}} · Close this tab when you've handled the bump</p>
  </div>

  <script>
    // Lightweight self-contained confetti — no CDN, works offline.
    // Roughly canvas-confetti's rain approach, condensed.
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    function resize() {
      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    addEventListener('resize', resize);

    const colors = ['#ff6b6b', '#f9ca24', '#f0932b', '#eb4d4b', '#6ab04c', '#4834d4', '#00d2d3', '#ff9ff3'];
    const particles = [];
    function spawnBurst(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 6;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 4,
          gravity: 0.18,
          size: 6 + Math.random() * 6,
          rot: Math.random() * Math.PI,
          vr: (Math.random() - 0.5) * 0.3,
          color: colors[(Math.random() * colors.length) | 0],
          life: 240 + Math.random() * 60,
        });
      }
    }
    function step() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;
        p.life -= 1;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = Math.max(p.life / 240, 0);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
        ctx.restore();
        if (p.life <= 0 || p.y > innerHeight + 40) particles.splice(i, 1);
      }
      requestAnimationFrame(step);
    }
    step();

    // Initial cannon-style bursts from the corners.
    setTimeout(() => spawnBurst(80, innerHeight - 40, 90), 200);
    setTimeout(() => spawnBurst(innerWidth - 80, innerHeight - 40, 90), 500);
    setTimeout(() => spawnBurst(innerWidth / 2, innerHeight - 40, 120), 900);
    // Follow-up bursts every 3s while the tab is focused.
    setInterval(() => {
      if (document.hidden) return;
      spawnBurst(Math.random() * innerWidth, innerHeight - 40, 30);
    }, 3000);

    // Also fire a soft sound on load (respects browser autoplay policies —
    // will silently fail if the tab hasn't been interacted with, that's fine).
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      const audio = new AudioCtx();
      const notes = [523.25, 659.25, 783.99, 1046.5]; // C E G C (major chord ↑)
      notes.forEach((freq, i) => {
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, audio.currentTime + i * 0.12);
        gain.gain.linearRampToValueAtTime(0.15, audio.currentTime + i * 0.12 + 0.02);
        gain.gain.linearRampToValueAtTime(0, audio.currentTime + i * 0.12 + 0.4);
        osc.connect(gain).connect(audio.destination);
        osc.start(audio.currentTime + i * 0.12);
        osc.stop(audio.currentTime + i * 0.12 + 0.4);
      });
    } catch (e) { /* audio blocked, skip */ }
  </script>
</body>
</html>
