name: tests

on:
  push:
    branches: [main, tests, security-hardening]
  pull_request:

jobs:
  bats:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: brew install bats-core jq

      - name: Run bats suite
        run: bats tests
